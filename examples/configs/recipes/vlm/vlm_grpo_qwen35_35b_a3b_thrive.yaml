grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 8
  max_rollout_turns: 1
  max_num_epochs: 1
  max_num_steps: 312
  normalize_rewards: true
  use_leave_one_out_baseline: true
  val_period: 11500
  val_at_start: false
  val_at_end: false
  overlong_filtering: false
  max_val_samples: 256
  val_batch_size: 256
  seed: 42
  use_dynamic_sampling: false
  batch_multiplier: 1
  reward_shaping:
    enabled: false
    overlong_buffer_length: 512
    overlong_buffer_penalty: 1
    max_response_length: ${policy.max_total_sequence_length}
  reward_scaling:
    enabled: false
    source_min: 0.0
    source_max: 1.0
    target_min: 0.0
    target_max: 1.0
  async_grpo:
    enabled: true
    max_trajectory_age_steps: 4
    in_flight_weight_updates: true
    recompute_kv_cache_after_weight_updates: false
  seq_logprob_error_threshold: null

loss_fn:
  reference_policy_kl_penalty: 0.01
  reference_policy_kl_type: "k3"
  kl_input_clamp_value: 20.0
  kl_output_clamp_value: 10.0
  ratio_clip_min: 0.2
  ratio_clip_max: 0.27
  ratio_clip_c: null
  use_on_policy_kl_approximation: false
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: null
  token_level_loss: true
  force_on_policy_ratio: false

checkpointing:
  enabled: true
  checkpoint_dir: "/mnt/data/pmartins/vlm_ckpts/grpo_qwen_35_35b_a4b_repetition_feedback_severity_0903_10k_detection_correctness_severity_21_multiplicative_format_025025025025" #grpo_sft_qwen_35_35b_a4b_repetition_feedback_severity_0903_repetition_feedback_severity_0903_10k_detection_correctness_severity_21_multiplicative_format_025025025025"
  metric_name: "val:accuracy"
  higher_is_better: true
  keep_top_k: 3
  save_period: 78
  checkpoint_must_save_by: null

policy:
  model_name: /mnt/data/pmartins/Qwen3.5-35B-A3B/ #/mnt/data/pmartins/vlm_ckpts/sft_qwen_35_35b_a4b_repetition_feedback_severity_0903/step_380/hf/
  tokenizer:
    name: ${policy.model_name}
  train_global_batch_size: 32
  train_micro_batch_size: 1
  generation_batch_size: 16
  logprob_batch_size: 2
  max_total_sequence_length: 16384
  precision: "bfloat16"
  offload_optimizer_for_logprob: false

  dtensor_cfg:
    _v2: true
    enabled: false
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null

  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  make_sequence_length_divisible_by: ${policy.megatron_cfg.tensor_model_parallel_size}
  max_grad_norm: 1.0

  sequence_packing:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  scheduler:
  - name: torch.optim.lr_scheduler.LinearLR
    kwargs:
      start_factor: 0.1
      end_factor: 1.0
      total_iters: 50
  - name: torch.optim.lr_scheduler.ConstantLR
    kwargs:
      factor: 1.0
      total_iters: 10000000000
  - milestones:
    - 50

  generation:
    backend: vllm
    max_new_tokens: 2048
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    tokenizer:
      name: ${policy.model_name}
    vllm_cfg:
      async_engine: true
      precision: ${policy.precision}
      kv_cache_dtype: "auto"
      tensor_parallel_size: 8
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.9
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: false
      enable_expert_parallel: false
      # VLMs require tokenizer to be initialized before generation
      skip_tokenizer_init: False
    vllm_kwargs:
      attention_backend: "FLASH_ATTN"
      media_io_kwargs:
        video:
          num_frames: 2048
      mm_processor_kwargs:
        size:
          longest_edge: 102000000
          shortest_edge: 4096
    colocated:
      enabled: false
      resources:
        gpus_per_node: 8
        num_nodes: 1

  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 1
    activation_checkpointing: true
    converter_type: "Qwen3MoeForCausalLM"
    tensor_model_parallel_size: 1
    expert_tensor_parallel_size: 2
    expert_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    sequence_parallel: false
    context_parallel_size: 1
    pipeline_dtype: ${policy.precision}
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 0.0
    moe_permute_fusion: false
    moe_token_dispatcher_type: "alltoall"
    moe_enable_deepep: false
    moe_shared_expert_overlap: false
    moe_grouped_gemm: true
    moe_per_layer_logging: false
    apply_rope_fusion: false
    bias_activation_fusion: true
    defer_fp32_logits: false

    optimizer:
      optimizer: "adam"
      lr: 2.0e-07
      min_lr: 2.0e-07
      weight_decay: 0.01
      bf16: true
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1.0e-08
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      clip_grad: ${policy.max_grad_norm}
      optimizer_cpu_offload: true
      optimizer_offload_fraction: 1.0

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: 1000
      lr_warmup_iters: 0
      lr_warmup_init: 2.0e-08

    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      average_in_collective: true
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"

    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:False"

data:
  max_input_seq_length: ${policy.max_total_sequence_length}
  train:
    dataset_name: "thrive-vlm"
    dataset_path: /mnt/data/shared/vlm/data/main_datasets/repetition_feedback_severity_0903_10k/train
    env_name: "thrive-vlm"
    split: "train"
    shuffle: true
    num_workers: 8
    prompt_file: null
    system_prompt_file: null
  validation:
    dataset_name: "thrive-vlm"
    dataset_path: /mnt/data/shared/vlm/data/main_datasets/repetition_feedback_severity_0903_10k/train
    env_name: "thrive-vlm"
    split: "train"
    shuffle: false
    num_workers: 8
    prompt_file: null
    system_prompt_file: null

env:
  thrive-vlm:
    num_workers: 8
    reward_mode: "detection_correctness_severity_multiplicative_format"
    detection_weight: 0.25
    correctness_weight: 0.25
    severity_weight: 0.25
    format_weight: 0.25
    error_weight: 2.0
    non_error_weight: 1.0

    # LLM Judge configuration
    judge:
      enabled: false
      model_name: Qwen/Qwen3-4B-Thinking-2507
      rubric_type: "repetition_analysis"
      output_format: "json"
      include_ground_truth: true
      judge_weight: 0.5
      batch_size: 4

      generation:
        backend: "vllm"
        max_new_tokens: 2048
        temperature: 0.0
        top_p: 1.0
        top_k: null
        tokenizer:
          name: ${env.thrive-vlm.judge.model_name}
          chat_template_kwargs:
            enable_thinking: true
        vllm_cfg:
          async_engine: false
          tensor_parallel_size: 2
          pipeline_parallel_size: 1
          expert_parallel_size: 1
          gpu_memory_utilization: 0.9
          max_model_len: 8192
          enforce_eager: false
          precision: "bfloat16"
          kv_cache_dtype: "auto"
          load_format: "auto"
          skip_tokenizer_init: false

      colocated:
        enabled: false
        colocation_target: "generation"
      resources:
        gpus_per_node: 4
        num_nodes: 1

logger:
  log_dir: "/home/pmartins/nemo-rl-vlm/logs_grpo/grpo_qwen_35_35b_a4b_repetition_feedback_severity_0903_10k_detection_correctness_severity_21_multiplicative_format_025025025025"
  wandb_enabled: false
  tensorboard_enabled: true
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  num_val_samples_to_print: 0
  wandb:
    project: "nemo-rl-vlm"
    name: "grpo_qwen_35_35b_a4b_repetition_feedback_severity_0903_10k_detection_correctness_severity_21_multiplicative_format_025025025025"
  tensorboard:
    log_dir: "/home/pmartins/nemo-rl-vlm/logs_grpo/grpo_qwen_35_35b_a4b_repetition_feedback_severity_0903_10k_detection_correctness_severity_21_multiplicative_format_025025025025"
  mlflow:
    experiment_name: "nemo-rl-vlm"
    run_name: "grpo_qwen_35_35b_a4b_repetition_feedback_severity_0903_10k_detection_correctness_severity_21_multiplicative_format_025025025025"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 8
  num_nodes: 3
